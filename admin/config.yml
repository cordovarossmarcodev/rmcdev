backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - name: "hero"
        label: "🏠 Hero Section"
        file: "data/hero.json"
        fields:
          - {label: "Status Badge", name: "status_badge", widget: "string"}
          - {label: "Your Name", name: "name", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Resume URL", name: "resume_url", widget: "string"}
      - name: "stats"
        label: "📊 Stats"
        file: "data/stats.json"
        fields:
          - label: "Stats"
            name: "items"
            widget: "list"
            fields:
              - {label: "Number", name: "number", widget: "number"}
              - {label: "Suffix (+ or %)", name: "suffix", widget: "string"}
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Color", name: "accent", widget: "select", options: ["green","gold"]}
      - name: "contact"
        label: "📬 Contact"
        file: "data/contact.json"
        fields:
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "LinkedIn URL", name: "linkedin", widget: "string"}
          - {label: "Facebook URL", name: "facebook", widget: "string"}
          - {label: "Instagram URL", name: "instagram", widget: "string"}

  - name: "cms_projects"
    label: "🌐 CMS Projects Showcase"
    files:
      - name: "projects"
        label: "All Projects"
        file: "data/projects.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - {label: "Site Name", name: "name", widget: "string"}
              - {label: "Live URL", name: "url", widget: "string"}
              - {label: "Screenshot Image", name: "img", widget: "image", required: false}

  - name: "seo"
    label: "📈 SEO Results"
    files:
      - name: "seo_results"
        label: "SEO Before/After"
        file: "data/seo.json"
        fields:
          - label: "Results"
            name: "items"
            widget: "list"
            fields:
              - {label: "Site Name", name: "site", widget: "string"}
              - {label: "Industry & Platform", name: "industry", widget: "string"}
              - {label: "Score BEFORE (%)", name: "before", widget: "number"}
              - {label: "Score AFTER (%)", name: "after", widget: "number"}

  - name: "design"
    label: "🎨 Graphic Design"
    files:
      - name: "gd"
        label: "Design Projects"
        file: "data/graphic-design.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
              - {label: "Tag", name: "tag", widget: "string"}
              - {label: "Image", name: "img", widget: "image", required: false}

  - name: "videos"
    label: "🎬 Videos"
    files:
      - name: "video_list"
        label: "Video List"
        file: "data/videos.json"
        fields:
          - label: "Videos"
            name: "items"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Tag", name: "tag", widget: "string"}
              - {label: "Note", name: "note", widget: "string"}
              - {label: "Thumbnail", name: "thumb", widget: "image", required: false}
              - label: "Platform"
                name: "video_platform"
                widget: "select"
                options:
                  - {label: "YouTube", value: "youtube"}
                  - {label: "Facebook", value: "facebook"}
                  - {label: "TikTok", value: "tiktok"}
                  - {label: "Link only", value: "link"}
              - {label: "Video URL", name: "video_url", widget: "string"}

  - name: "email"
    label: "📧 Email Campaigns"
    files:
      - name: "email_list"
        label: "Email Campaigns"
        file: "data/email.json"
        fields:
          - label: "Campaigns"
            name: "items"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Tag", name: "tag", widget: "string"}
              - {label: "Embed iframe URL", name: "iframe", widget: "string", required: false}
              - {label: "Image (optional)", name: "img", widget: "image", required: false}
              - label: "Tools"
                name: "tools"
                widget: "list"
                field: {label: "Tool", name: "tool", widget: "string"}

  - name: "experience"
    label: "💼 Experience"
    files:
      - name: "exp_list"
        label: "Work History"
        file: "data/experience.json"
        fields:
          - label: "Roles"
            name: "items"
            widget: "list"
            fields:
              - {label: "Number (01, 02...)", name: "num", widget: "string"}
              - {label: "Job Title", name: "job", widget: "string"}
              - {label: "Company", name: "company", widget: "string"}
              - {label: "Location", name: "location", widget: "string"}
              - {label: "Date Range", name: "date", widget: "string"}
              - label: "Bullet Points"
                name: "bullets"
                widget: "list"
                field: {label: "Bullet", name: "bullet", widget: "string"}
